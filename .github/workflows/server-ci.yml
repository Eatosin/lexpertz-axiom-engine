name: Axiom Engine Server Guard

on:
  push:
    branches: [ "main" ]
    paths:
      - 'server/**' 
      - 'tests/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'server/**'
      - 'tests/**'

jobs:
  python-quality:
    name: Sovereign Logic Gate
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy types-requests pytest pytest-asyncio python-dotenv

      - name: SOTA Linting (Ruff)
        run: ruff check . || echo "Ruff found issues (Non-blocking for MVP)"

      - name: Type Safety (MyPy)
        run: mypy app --ignore-missing-imports

      - name: Sovereign Agent Tests (Pytest)
        working-directory: ./
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: pytest tests/ -v -s
