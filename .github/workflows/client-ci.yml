name: Axiom Client Quality Guard

on:
  push:
    branches: [ "main" ]
    paths:
      - 'client/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'client/**'

jobs:
  build-and-test:
    name: Client Pipeline
    runs-on: ubuntu-latest
    
    # Set the working directory to the client folder for all steps
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install Dependencies
        # 'npm ci' (Clean Install)
        run: npm ci

      - name: Type Check, Lint, & Production Build
        # Next.js 16 automatically runs full ESLint and TypeScript checks during 'build'.
        # If this step passes, the code is mathematically proven to be clean.
        run: npm run build
        env:
          # Dummy keys to satisfy the Clerk compiler during build time
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuYWNjb3VudHMuZGV2JA
          CLERK_SECRET_KEY: sk_test_51MzS0vL2Z1Z1Z1Z1Z1Z1Z1Z1Z1Z1Z1Z1
